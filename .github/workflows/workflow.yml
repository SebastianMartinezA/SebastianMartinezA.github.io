name: Github Pages Deploy

on:
  push:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend_react/package-lock.json
      
      - name: Install, test, and build
        working-directory: frontend_react
        env:
          VITE_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ vars.VITE_PUBLIC_POSTHOG_PROJECT_TOKEN }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ vars.VITE_PUBLIC_POSTHOG_HOST }}
        run: |
          npm ci
          npm test
          npm run build

      - name: Upload verified site artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: portfolio-site
          path: frontend_react/dist
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Download verified site artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: portfolio-site
          path: frontend_react/dist

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@8817a56e5bfec6e2b08345c81f4d422db53a2cdc # v4.3.3
        with:
          branch: gh-pages # The branch the action should deploy to.
          folder: frontend_react/dist # The folder the action should deploy.

      - name: Smoke test production
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 10 https://smar.ar/ --output /tmp/site.html
          grep --fixed-strings "Sebastian Martinez" /tmp/site.html
          curl --fail --silent --show-error --retry 5 --retry-delay 10 https://smar.ar/sitemap.xml --output /tmp/sitemap.xml
          grep --fixed-strings "https://smar.ar/" /tmp/sitemap.xml
